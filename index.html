<!DOCTYPE html>
<html>
<head>
  <title>XAdCheck Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white p-10">
  <h1 class="text-4xl font-bold mb-8">XAdCheck Backend Test</h1>
  <button onclick="testBackend()" class="bg-amber-400 text-black px-8 py-4 rounded-3xl font-semibold">Test Backend</button>
  <div id="result" class="mt-8 p-6 bg-zinc-900 rounded-3xl"></div>

<script>
async function testBackend() {
  const result = document.getElementById('result');
  result.innerHTML = 'Testing backend...';
  try {
    const response = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ headline: 'Test Headline', body: 'Test body text', category: 'political' })
    });
    const data = await response.json();
    result.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
  } catch (e) {
    result.innerHTML = 'Error: ' + e.message;
  }
}
</script>
</body>
</html>
